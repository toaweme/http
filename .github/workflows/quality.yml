name: Quality

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # the client module at the repo root.
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      # v7.0.0 (https://github.com/actions/checkout/releases/tag/v7.0.0)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # v6.5.0 (https://github.com/actions/setup-go/releases/tag/v6.5.0)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: stable

      # v0.8.0 (https://github.com/toaweme/care/releases/tag/v0.8.0)
      - uses: toaweme/care@3284955e1fb40602f84d1f7f192e67bc2ef78221
        with:
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

  # the server module, which has its own go.mod under server/.
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # v7.0.0 (https://github.com/actions/checkout/releases/tag/v7.0.0)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # v6.5.0 (https://github.com/actions/setup-go/releases/tag/v6.5.0)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: stable

      # v0.8.0 (https://github.com/toaweme/care/releases/tag/v0.8.0)
      - uses: toaweme/care@3284955e1fb40602f84d1f7f192e67bc2ef78221
        with:
          dir: server
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care
