name: Quality

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # the client module at the repo root.
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - uses: toaweme/care@e684a2e9486d28281fe12d9fdd1284aa946c2825 # v0.9.4
        with:
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish the client module's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          publish-url: https://code.toawe.me/ingest?kind=code

  # the server module, which has its own go.mod under server/.
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - uses: toaweme/care@e684a2e9486d28281fe12d9fdd1284aa946c2825 # v0.9.4
        with:
          dir: server
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish the server module's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          dir: server
          publish-url: https://code.toawe.me/ingest?kind=code
