name: Quality

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # the client module at the repo root.
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - uses: toaweme/care@8c5839056d7aeea9ffb5fb513bed9f9b9797e0d8 # v0.9.3
        with:
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish the client module's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          publish-url: https://code.toawe.me/ingest?kind=code

  # the server module, which has its own go.mod under server/.
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - uses: toaweme/care@8c5839056d7aeea9ffb5fb513bed9f9b9797e0d8 # v0.9.3
        with:
          dir: server
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish the server module's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          dir: server
          publish-url: https://code.toawe.me/ingest?kind=code
