name: Quality

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # the client module at the repo root.
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - uses: toaweme/care@3745e681924c9f0090ba1a310476011b7c7b5c44 # v0.8.1
        with:
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care

  # the server module, which has its own go.mod under server/.
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - uses: toaweme/care@3745e681924c9f0090ba1a310476011b7c7b5c44 # v0.8.1
        with:
          dir: server
          strict: true
          publish-url: https://code.toawe.me/ingest?kind=care
